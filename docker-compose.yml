version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: auctionhub-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auctionhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - auctionhub-network

  # Auctions Service (добавим позже)
